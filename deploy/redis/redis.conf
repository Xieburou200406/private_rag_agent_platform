# 基础端口
port 6379
bind 0.0.0.0
# 密码由 docker-compose command 注入：--requirepass ${REDIS_PASSWORD}
# 此处禁止写死 requirepass

# 时区日志
logfile "/data/redis.log"
loglevel notice
databases 16

# 持久化配置 RDB+AOF双持久，防止会话/缓存丢失
save 60 1
save 300 10
save 3600 1000
dbfilename dump.rdb

appendonly yes
appendfilename appendonly.aof
appendfsync everysec

# 内存策略（RAG高频向量缓存专用）
maxmemory 4g
maxmemory-policy allkeys-lru
maxmemory-samples 10

# 连接限制
maxclients 10000
timeout 300
tcp-keepalive 60

# 关闭危险命令，安全加固
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
